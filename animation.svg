<svg width="800" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .nombre { font: 700 52px 'Segoe UI', sans-serif; fill: #534AB7; letter-spacing: 2px; }
      .rol { font: 400 22px 'Segoe UI', sans-serif; fill: #7F77DD; letter-spacing: 6px; }
      .letra { opacity: 0; }
      .l1{animation:a .1s .1s forwards, pulso 2s 0.1s infinite}
      .l2{animation:a .1s .2s forwards, pulso 2s 0.2s infinite}
      .l3{animation:a .1s .3s forwards, pulso 2s 0.3s infinite}
      .l4{animation:a .1s .4s forwards, pulso 2s 0.4s infinite}
      .l5{animation:a .1s .5s forwards, pulso 2s 0.5s infinite}
      .l6{animation:a .1s .6s forwards, pulso 2s 0.6s infinite}
      .l7{animation:a .1s .7s forwards, pulso 2s 0.7s infinite}
      .l8{animation:a .1s .8s forwards, pulso 2s 0.8s infinite}
      .l9{animation:a .1s .9s forwards, pulso 2s 0.9s infinite}
      .l10{animation:a .1s 1.0s forwards, pulso 2s 1.0s infinite}
      .l11{animation:a .1s 1.1s forwards, pulso 2s 1.1s infinite}
      .l12{animation:a .1s 1.2s forwards, pulso 2s 1.2s infinite}
      .l13{animation:a .1s 1.3s forwards, pulso 2s 1.3s infinite}
      .l14{animation:a .1s 1.4s forwards, pulso 2s 1.4s infinite}
      .l15{animation:a .1s 1.5s forwards, pulso 2s 1.5s infinite}
      .l16{animation:a .1s 1.6s forwards, pulso 2s 1.6s infinite}
      .l17{animation:a .1s 1.7s forwards, pulso 2s 1.7s infinite}
      .l18{animation:a .1s 1.8s forwards, pulso 2s 1.8s infinite}
      .l19{animation:a .1s 1.9s forwards, pulso 2s 1.9s infinite}
      .rol1 { animation: ciclo1 6s 2.2s infinite, pulso 2s infinite; }
      .rol2 { animation: ciclo2 6s 2.2s infinite, pulso 2s infinite; }
      @keyframes ciclo1 {
        0%   { opacity: 0; }
        10%  { opacity: 1; }
        40%  { opacity: 1; }
        50%  { opacity: 0; }
        100% { opacity: 0; }
      }
      @keyframes ciclo2 {
        0%   { opacity: 0; }
        50%  { opacity: 0; }
        60%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes pulso {
        0%   { fill: #534AB7; }
        50%  { fill: #AFA9EC; }
        100% { fill: #534AB7; }
      }
      @keyframes a { to { opacity: 1; } }
    </style>
  </defs>

  <text x="400" y="100" text-anchor="middle" class="nombre">
    <tspan class="letra l1">J</tspan><tspan class="letra l2">u</tspan><tspan class="letra l3">a</tspan><tspan class="letra l4">n</tspan><tspan class="letra l5"> </tspan><tspan class="letra l6">D</tspan><tspan class="letra l7">i</tspan><tspan class="letra l8">e</tspan><tspan class="letra l9">g</tspan><tspan class="letra l10">o</tspan><tspan class="letra l11"> </tspan><tspan class="letra l12">M</tspan><tspan class="letra l13">o</tspan><tspan class="letra l14">n</tspan><tspan class="letra l15">s</tspan><tspan class="letra l16">a</tspan><tspan class="letra l17">l</tspan><tspan class="letra l18">v</tspan><tspan class="letra l19">e</tspan>
  </text>

  <text x="400" y="148" text-anchor="middle" class="rol rol1">F U L L  S T A C K</text>
  <text x="400" y="148" text-anchor="middle" class="rol rol2">D E V E L O P E R</text>
</svg>
